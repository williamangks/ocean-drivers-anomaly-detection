# Human-readable metadata about upstream data sources (not code).
# Used to keep documentation aligned with ingestion implementations.

sources:
  sst:
    name: "NOAA OISST v2.1 (via ERDDAP griddap)"
    dataset_id: "ncdcOisst21Agg"
    erddap_base: "https://coastwatch.pfeg.noaa.gov/erddap/griddap"
    temporal: "daily"
    notes: >
      Daily SST, surface-only (zlev=0.0). Dataset longitude is 0..360; ingestion converts bbox
      longitude to 0..360 and queries an end-exclusive UTC window [d0, d1+1).

  chlorophyll:
    name: "NOAA CoastWatch Chlorophyll-a 8-day composite (via ERDDAP griddap)"
    dataset_id: "erdMBchla8day_LonPM180"
    erddap_base: "https://coastwatch.pfeg.noaa.gov/erddap/griddap"
    temporal: "8-day"
    notes: >
      ERDDAP `time` is centered per 8-day composite. Ingestion converts to a window:
      start=center-3d, end=center+4d, then keeps composites overlapping the target month.
      Longitude is -180..180 (no conversion). Uses altitude=0.0.

  waves:
    name: "WaveWatch III (WW3) global model (via ERDDAP griddap)"
    dataset_id: "NWW3_Global_Best"
    erddap_base: "https://coastwatch.pfeg.noaa.gov/erddap/griddap"
    temporal: "hourly -> daily mean"
    variables:
      Thgt: "significant wave height (m) -> swh_m"
      Tper: "peak wave period (s) -> peak_period_s"
    notes: >
      Dataset longitude is 0..360; ingestion supports dateline-crossing regions by splitting the
      lon interval into up to two requests. Downloads hourly fields and aggregates to daily mean.
